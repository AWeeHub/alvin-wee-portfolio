<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWee Digital — GoHighLevel Systems Builder</title>
    <meta
      name="description"
      content="I build complete customer-acquisition systems — funnels, CRM, automation, and design — for businesses that need more leads, more booked calls, and less manual work."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- The hero portrait is the largest thing painted, but React only asks for
         it once the bundle has parsed and rendered. Naming it here lets the
         browser start the fetch from the HTML instead. -->
    <link rel="preload" as="image" href="/portrait.webp" fetchpriority="high" />
    <!-- The three faces the hero is painted with. Imported from CSS, the browser
         only discovers them after the stylesheet has downloaded and parsed, so on
         a throttled phone they landed at 3.4s — after the headline had already
         been laid out in the fallback, which then re-wrapped when they arrived
         (CLS 0.22). Named here, they are fetched alongside the CSS instead.
         The filenames are stable by build config; see vite.config.ts. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/assets/fonts/saira-latin-wght-normal.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/assets/fonts/archivo-latin-wght-normal.woff2"
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      crossorigin
      href="/assets/fonts/poppins-latin-400-normal.woff2"
    />
    <meta name="theme-color" content="#05070A" />
    <link rel="canonical" href="https://awee.digital/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AWee Digital" />
    <meta property="og:title" content="AWee Digital — GoHighLevel Systems Builder" />
    <meta
      property="og:description"
      content="Funnels, CRM, and automation working as one system — more leads, more booked calls, less manual work."
    />
    <meta property="og:url" content="https://awee.digital/" />
    <meta property="og:image" content="https://awee.digital/og.png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AWee Digital — GoHighLevel Systems Builder" />
    <meta
      name="twitter:description"
      content="Funnels, CRM, and automation working as one system — more leads, more booked calls, less manual work."
    />
    <meta name="twitter:image" content="https://awee.digital/og.png" />
    <!-- Structured data: who this is and what is on offer. The page copy is
         painted by JS, so this is the one place a crawler reliably reads the
         person, the business, and the services as data rather than as pixels.
         Kept in sync with src/data/services.ts. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "@id": "https://awee.digital/#alvin",
            "name": "Alvin Wee",
            "jobTitle": "GoHighLevel Systems Builder",
            "description": "Builds complete customer-acquisition systems — funnels, CRM, automation, and web design.",
            "url": "https://awee.digital/",
            "email": "alvin@awee.digital",
            "image": "https://awee.digital/portrait.webp",
            "sameAs": ["https://www.linkedin.com/in/alvinwee"],
            "knowsAbout": [
              "GoHighLevel",
              "Sales funnels",
              "CRM setup",
              "Marketing automation",
              "Landing page design",
              "Web design"
            ],
            "worksFor": { "@id": "https://awee.digital/#awee" }
          },
          {
            "@type": "ProfessionalService",
            "@id": "https://awee.digital/#awee",
            "name": "AWee Digital",
            "description": "Funnels, CRM, and automation working as one system — more leads, more booked calls, less manual work.",
            "url": "https://awee.digital/",
            "image": "https://awee.digital/og.png",
            "email": "alvin@awee.digital",
            "founder": { "@id": "https://awee.digital/#alvin" },
            "areaServed": "Worldwide",
            "availableChannel": {
              "@type": "ServiceChannel",
              "serviceUrl": "https://awee.digital/"
            },
            "hasOfferCatalog": {
              "@type": "OfferCatalog",
              "name": "Services",
              "itemListElement": [
                { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Sales Funnel Development" } },
                { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Landing Page Design" } },
                { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Workflow Automation" } },
                { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "CRM Setup" } },
                { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Web Design" } }
              ]
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
